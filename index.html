<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言墙测试页</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f7fa; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        button { background: #4f46e5; color: white; border: none; padding: 12px 20px; border-radius: 40px; cursor: pointer; width: 100%; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 16px; margin-bottom: 12px; }
        .msg { background: #eef2ff; padding: 12px; border-radius: 16px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>📮 留言墙测试页</h1>
    <p>如果你能看到这个页面，说明 GitHub Pages 已正常工作 ✅</p>
    
    <div class="card">
        <h2>📢 公开留言（测试版）</h2>
        <input type="text" id="nickname" placeholder="你的昵称">
        <textarea id="content" rows="2" placeholder="说点什么..."></textarea>
        <button onclick="postMessage()">发布留言</button>
        <div id="list" style="margin-top: 20px;"></div>
    </div>

    <script>
        let messages = JSON.parse(localStorage.getItem("test_messages") || "[]");
        
        function render() {
            let list = document.getElementById("list");
            list.innerHTML = messages.map(m => `<div class="msg"><strong>${escapeHtml(m.name)}</strong><br>${escapeHtml(m.content)}</div>`).join("");
            if(messages.length === 0) list.innerHTML = "<p>暂无留言，发布第一条吧～</p>";
        }
        
        function postMessage() {
            let name = document.getElementById("nickname").value.trim();
            let content = document.getElementById("content").value.trim();
            if(!name || !content) { alert("请填写昵称和内容"); return; }
            messages.unshift({ name, content, time: Date.now() });
            localStorage.setItem("test_messages", JSON.stringify(messages));
            document.getElementById("content").value = "";
            render();
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
        
        render();
    </script>
    <p style="margin-top: 20px; font-size: 12px; color: gray;">✅ 如果你能正常发布留言，说明 GitHub Pages 配置成功！</p>
</body>
</html>
