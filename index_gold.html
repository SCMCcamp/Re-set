<!DOCTYPE html>

<body>
<div class="app">

<script>
    const SUPABASE_URL = "https://chfanuzhklzzawbcazjp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_7yvNBNHbSe-2cPbQ-yiXpA_z6dr1DYf";
    const ADMIN_PASSWORD = "reset2024";

    let currentUser = "";
    let isAdmin = false;
    let currentContact = null;
    let allUsersCache = [];

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function formatTime(ts) { let d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

    async function fetchAPI(path, options = {}) {
        let res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Content-Type": "application/json" },
            ...options
        });
        return res;
    }

    // 获取所有用户
    async function getAllUsers() {
        let users = new Set();
        try {
            let publics = await (await fetchAPI(`public_messages?select=username`)).json();
            publics.forEach(m => users.add(m.username));
            let privates = await (await fetchAPI(`private_messages?select=fromUser,toUser`)).json();
            privates.forEach(m => { users.add(m.fromUser); users.add(m.toUser); });
        } catch(e) { console.error(e); }
        return Array.from(users).filter(u => u && u !== currentUser);
    }

    // 删除用户
    async function deleteUserData(username) {
        if (!confirm(`⚠️ 确定要永久删除用户 "${username}" 吗？\n\n这将删除该用户的：\n• 所有公开留言\n• 所有私信（发送和接收）\n\n此操作不可恢复！`)) return false;
        try {
            let publics = await (await fetchAPI(`public_messages?username=eq.${username}`)).json();
            for (let msg of publics) await fetchAPI(`public_messages?id=eq.${msg.id}`, { method: "DELETE" });
            let privates = await (await fetchAPI(`private_messages?or=(fromUser.eq.${username},toUser.eq.${username})`)).json();
            for (let msg of privates) await fetchAPI(`private_messages?id=eq.${msg.id}`, { method: "DELETE" });
            alert(`✅ 用户 "${username}" 及其所有数据已删除`);
            return true;
        } catch(e) { alert("删除失败：" + e.message); return false; }
    }

    async function getContacts() {
        if (!currentUser) return [];
        let users = new Set();
        try {
            let res = await fetchAPI(`private_messages?select=fromUser,toUser`);
            let data = await res.json();
            data.forEach(m => {
                if (m.fromUser === currentUser) users.add(m.toUser);
                if (m.toUser === currentUser) users.add(m.fromUser);
            });
        } catch(e) { console.error(e); }
        return Array.from(users).filter(u => u);
    }

    async function getMessagesWith(user) {
        try {
            let res = await fetchAPI(`private_messages?order=timestamp.asc&or=(fromUser.eq.${currentUser},toUser.eq.${currentUser})`);
            let data = await res.json();
            return data.filter(m => (m.fromUser === currentUser && m.toUser === user) || (m.fromUser === user && m.toUser === currentUser));
        } catch(e) { return []; }
    }

    async function loadPublic() {
        try {
            let res = await fetchAPI(`public_messages?order=timestamp.desc`);
            let data = await res.json();
            let container = document.getElementById("publicList");
            if (!data || data.length === 0) { container.innerHTML = '<div class="empty-sticky">📌 还没有便利贴</div>'; return; }
            container.innerHTML = "";
            data.forEach(msg => {
                let canDelete = (currentUser === msg.username) || isAdmin;
                container.innerHTML += `
                    <div class="sticky-note">
                        <div class="sticky-header"><span class="sticky-author">✏️ ${escapeHtml(msg.username)}</span><span class="sticky-time">${formatTime(msg.timestamp)}</span></div>
                        <div class="sticky-content">${escapeHtml(msg.content)}</div>
                        <div class="sticky-footer">${canDelete ? `<button class="delete-sticky" onclick="deletePublic(${msg.id})">🗑️ 撕掉</button>` : ''}</div>
                    </div>
                `;
            });
        } catch(e) { document.getElementById("publicList").innerHTML = '<div class="empty-sticky">⚠️ 加载失败</div>'; }
    }

    async function loadContacts() {
        if (!currentUser) {
            document.getElementById("contactList").innerHTML = '<div class="empty-contact">请先设置昵称</div>';
            return;
        }
        let contacts = await getContacts();
        let container = document.getElementById("contactList");
        if (contacts.length === 0) {
            container.innerHTML = '<div class="empty-contact">💬 暂无联系人<br>点击"+ 新聊天"开始对话</div>';
            return;
        }
        container.innerHTML = "";
        for (let contact of contacts) {
            let msgs = await getMessagesWith(contact);
            let lastMsg = msgs.length ? msgs[msgs.length-1].content : "";
            container.innerHTML += `
                <div class="contact-item" onclick="selectContact('${escapeHtml(contact)}')">
                    <div class="contact-avatar">${escapeHtml(contact.charAt(0).toUpperCase())}</div>
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(contact)}</div>
                        <div class="contact-preview">${escapeHtml(lastMsg.slice(0,30))}</div>
                    </div>
                    <div class="contact-badge">${msgs.length}</div>
                </div>
            `;
        }
        if (currentContact) {
            let highlight = document.querySelector(`.contact-item[onclick="selectContact('${currentContact}')"]`);
            if (highlight) highlight.classList.add("active");
        }
    }

    async function selectContact(contact) {
        if (!currentUser) return;
        currentContact = contact;
        let msgs = await getMessagesWith(contact);
        let container = document.getElementById("chatMessages");
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-chat">💬 没有消息，发一条吧～</div>';
        } else {
            container.innerHTML = "";
            msgs.forEach(m => {
                let isSender = (m.fromUser === currentUser);
                let canDelete = isSender || isAdmin;
                container.innerHTML += `
                    <div class="chat-bubble ${isSender ? 'bubble-sent' : 'bubble-received'}">
                        <div class="bubble-content">${escapeHtml(m.content)}</div>
                        <div class="bubble-info">
                            <span>${formatTime(m.timestamp)}</span>
                            ${canDelete ? `<button class="delete-sticky" onclick="deletePrivateMsg(${m.id})" style="background:none; border:none; color:#94a3b8; cursor:pointer;">删除</button>` : ''}
                        </div>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        }
        document.getElementById("chatHeader").style.display = "flex";
        document.getElementById("chatInputArea").style.display = "flex";
        document.getElementById("chatAvatar").innerText = contact.charAt(0).toUpperCase();
        document.getElementById("chatWithName").innerText = contact;
        
        if (isAdmin && contact !== currentUser) {
            document.getElementById("deleteUserBtn").style.display = "inline-block";
        } else {
            document.getElementById("deleteUserBtn").style.display = "none";
        }
        
        document.querySelectorAll(".contact-item").forEach(el => el.classList.remove("active"));
        let highlight = document.querySelector(`.contact-item[onclick="selectContact('${contact}')"]`);
        if (highlight) highlight.classList.add("active");
    }

    async function sendPrivateMessage(toUser, content) {
        let res = await fetchAPI(`private_messages`, {
            method: "POST",
            body: JSON.stringify({ fromUser: currentUser, toUser: toUser, content: content, timestamp: Date.now() })
        });
        return res.ok;
    }

    async function sendToCurrent() {
        if (!currentUser) { alert("请先设置昵称"); return; }
        if (!currentContact) { alert("请先从左侧选择一个联系人"); return; }
        let content = document.getElementById("chatMessageInput").value.trim();
        if (!content) { alert("输入消息内容"); return; }
        let btn = document.getElementById("sendChatBtn");
        btn.innerText = "发送中...";
        btn.disabled = true;
        let success = await sendPrivateMessage(currentContact, content);
        if (success) {
            document.getElementById("chatMessageInput").value = "";
            await loadContacts();
            await selectContact(currentContact);
        } else alert("发送失败");
        btn.innerText = "发送";
        btn.disabled = false;
    }

    // 搜索用户并开始新聊天
    function openNewChatModal() {
        document.getElementById("newChatModal").style.display = "flex";
        document.getElementById("searchUserInput").value = "";
        document.getElementById("userSearchResults").innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8;">输入关键词搜索用户</div>';
        document.getElementById("searchUserInput").focus();
    }
    
    async function searchUsers() {
        let keyword = document.getElementById("searchUserInput").value.trim().toLowerCase();
        let resultsDiv = document.getElementById("userSearchResults");
        
        if (allUsersCache.length === 0) {
            allUsersCache = await getAllUsers();
        }
        
        let filtered = allUsersCache.filter(u => u.toLowerCase().includes(keyword));
        
        if (filtered.length === 0) {
            resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8;">😢 没有找到匹配的用户</div>';
            return;
        }
        
        resultsDiv.innerHTML = filtered.map(user => `
            <div class="user-item">
                <div class="user-name">
                    <div class="user-avatar">${escapeHtml(user.charAt(0).toUpperCase())}</div>
                    <span>${escapeHtml(user)}</span>
                </div>
                <button class="user-select-btn" onclick="startChatWith('${escapeHtml(user)}')">💬 发消息</button>
            </div>
        `).join('');
    }
    
    async function startChatWith(user) {
        document.getElementById("newChatModal").style.display = "none";
        // 自动发送一条打招呼消息
        let msg = prompt(`给 ${user} 发送第一条消息：`, "你好！很高兴认识你~");
        if (msg && msg.trim()) {
            let success = await sendPrivateMessage(user, msg.trim());
            if (success) {
                await loadContacts();
                await selectContact(user);
                alert(`✅ 已发送消息给 ${user}`);
            } else {
                alert("发送失败");
            }
        } else if (msg === "") {
            alert("消息不能为空");
        }
    }

    async function postPublic() {
        if (!currentUser) { alert("请先设置昵称"); return; }
        let content = document.getElementById("publicContent").value.trim();
        if (!content) { alert("写点内容吧～"); return; }
        let btn = document.getElementById("postPublicBtn");
        btn.innerText = "张贴中...";
        btn.disabled = true;
        let res = await fetchAPI(`public_messages`, {
            method: "POST",
            body: JSON.stringify({ username: currentUser, content: content, timestamp: Date.now() })
        });
        if (res.ok) {
            document.getElementById("publicContent").value = "";
            await loadPublic();
            alert("✅ 便利贴贴上啦！");
        } else alert("发布失败");
        btn.innerText = "📝 贴上便利贴";
        btn.disabled = false;
    }

    async function deletePublic(id) {
        if (!confirm("撕掉这张便利贴？")) return;
        await fetchAPI(`public_messages?id=eq.${id}`, { method: "DELETE" });
        await loadPublic();
    }

    async function deletePrivateMsg(id) {
        if (!confirm("删除这条消息？")) return;
        await fetchAPI(`private_messages?id=eq.${id}`, { method: "DELETE" });
        if (currentContact) await selectContact(currentContact);
        await loadContacts();
    }

    async function setUserName() {
        let newName = document.getElementById("nicknameInput").value.trim();
        if (!newName) return;
        if (localStorage.getItem("wall_user_final")) { alert("昵称已设置不可更改"); return; }
        let res = await fetchAPI(`public_messages?select=username`);
        let existing = await res.json();
        let usedNames = new Set(existing.map(m => m.username));
        if (usedNames.has(newName)) { alert("昵称已被使用"); return; }
        currentUser = newName;
        localStorage.setItem("wall_user_final", currentUser);
        document.getElementById("currentUserBadge").innerHTML = `👤 ${escapeHtml(currentUser)}`;
        document.getElementById("nicknameInput").disabled = true;
        document.getElementById("setNameBtn").disabled = true;
        await loadContacts();
        allUsersCache = [];
    }

    async function adminChangeName() {
        let oldName = prompt("输入要修改的用户昵称：");
        if (!oldName) return;
        let newName = prompt("输入新昵称：");
        if (!newName) return;
        let publics = await (await fetchAPI(`public_messages?username=eq.${oldName}`)).json();
        for (let msg of publics) await fetchAPI(`public_messages?id=eq.${msg.id}`, { method: "PATCH", body: JSON.stringify({ username: newName }) });
        let privates = await (await fetchAPI(`private_messages?or=(fromUser.eq.${oldName},toUser.eq.${oldName})`)).json();
        for (let msg of privates) {
            let update = {};
            if (msg.fromUser === oldName) update.fromUser = newName;
            if (msg.toUser === oldName) update.toUser = newName;
            await fetchAPI(`private_messages?id=eq.${msg.id}`, { method: "PATCH", body: JSON.stringify(update) });
        }
        if (currentUser === oldName) {
            currentUser = newName;
            localStorage.setItem("wall_user_final", newName);
            document.getElementById("currentUserBadge").innerHTML = `👤 ${escapeHtml(currentUser)}`;
        }
        await loadPublic();
        await loadContacts();
        if (currentContact === oldName) await selectContact(newName);
        allUsersCache = [];
        alert("✅ 昵称修改成功");
    }

    // 管理员用户列表弹窗
    async function openUserListModal() {
        if (!isAdmin) return;
        let users = await getAllUsers();
        document.getElementById("allUsersList").innerHTML = users.map(user => `
            <div class="user-item">
                <div class="user-name">
                    <div class="user-avatar">${escapeHtml(user.charAt(0).toUpperCase())}</div>
                    <span>${escapeHtml(user)}</span>
                </div>
                <button class="user-delete-btn" onclick="adminDeleteUserFromList('${escapeHtml(user)}')">🗑️ 删除</button>
            </div>
        `).join('');
        document.getElementById("userListModal").style.display = "flex";
        // 搜索功能
        document.getElementById("searchUserListInput").value = "";
        document.getElementById("searchUserListInput").oninput = function() {
            let keyword = this.value.trim().toLowerCase();
            let filtered = users.filter(u => u.toLowerCase().includes(keyword));
            document.getElementById("allUsersList").innerHTML = filtered.map(user => `
                <div class="user-item">
                    <div class="user-name">
                        <div class="user-avatar">${escapeHtml(user.charAt(0).toUpperCase())}</div>
                        <span>${escapeHtml(user)}</span>
                    </div>
                    <button class="user-delete-btn" onclick="adminDeleteUserFromList('${escapeHtml(user)}')">🗑️ 删除</button>
                </div>
            `).join('');
        };
    }
    
    async function adminDeleteUserFromList(username) {
        if (username === currentUser) { alert("不能删除自己"); return; }
        let success = await deleteUserData(username);
        if (success) {
            document.getElementById("userListModal").style.display = "none";
            await loadPublic();
            await loadContacts();
            if (currentContact === username) {
                currentContact = null;
                document.getElementById("chatHeader").style.display = "none";
                document.getElementById("chatInputArea").style.display = "none";
                document.getElementById("chatMessages").innerHTML = '<div class="empty-chat">💬 该用户已被删除</div>';
            }
            allUsersCache = [];
        }
    }

    function verifyAdmin() {
        let pwd = document.getElementById("adminPassword").value;
        if (pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById("adminBadge").style.display = "inline-block";
            document.getElementById("exitAdminBtn").style.display = "inline-block";
            document.getElementById("resetNameBtn").style.display = "inline-block";
            document.getElementById("showUsersBtn").style.display = "inline-block";
            alert("✅ 管理员模式已启用\n\n新增功能：\n• 可删除任意用户\n• 用户列表支持搜索");
            loadPublic();
            if (currentContact) selectContact(currentContact);
        } else alert("❌ 密码错误");
    }

    function exitAdmin() {
        isAdmin = false;
        document.getElementById("adminBadge").style.display = "none";
        document.getElementById("exitAdminBtn").style.display = "none";
        document.getElementById("resetNameBtn").style.display = "none";
        document.getElementById("showUsersBtn").style.display = "none";
        document.getElementById("deleteUserBtn").style.display = "none";
        alert("已退出管理员模式");
        loadPublic();
        if (currentContact) selectContact(currentContact);
    }

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            document.getElementById(btn.dataset.tab).classList.add("active");
            if (btn.dataset.tab === "tab2" && currentUser) loadContacts();
        });
    });

    async function init() {
        window.deletePublic = deletePublic;
        window.deletePrivateMsg = deletePrivateMsg;
        window.selectContact = selectContact;
        window.startChatWith = startChatWith;
        window.adminDeleteUserFromList = adminDeleteUserFromList;
        
        let saved = localStorage.getItem("wall_user_final");
        if (saved) {
            currentUser = saved;
            document.getElementById("currentUserBadge").innerHTML = `👤 ${escapeHtml(currentUser)}`;
            document.getElementById("nicknameInput").disabled = true;
            document.getElementById("setNameBtn").disabled = true;
            document.getElementById("nicknameInput").value = currentUser;
        }
        document.getElementById("setNameBtn").onclick = setUserName;
        document.getElementById("verifyAdminBtn").onclick = verifyAdmin;
        document.getElementById("exitAdminBtn").onclick = exitAdmin;
        document.getElementById("resetNameBtn").onclick = adminChangeName;
        document.getElementById("showUsersBtn").onclick = openUserListModal;
        document.getElementById("postPublicBtn").onclick = postPublic;
        document.getElementById("sendChatBtn").onclick = sendToCurrent;
        document.getElementById("newChatBtn").onclick = openNewChatModal;
        document.getElementById("cancelNewChat").onclick = () => document.getElementById("newChatModal").style.display = "none";
        document.getElementById("closeUserListBtn").onclick = () => document.getElementById("userListModal").style.display = "none";
        document.getElementById("deleteUserBtn").onclick = () => {
            if (currentContact && confirm(`⚠️ 确定要永久删除用户 "${currentContact}" 吗？`)) {
                deleteUserData(currentContact).then(success => {
                    if (success) {
                        loadContacts();
                        currentContact = null;
                        document.getElementById("chatHeader").style.display = "none";
                        document.getElementById("chatInputArea").style.display = "none";
                        document.getElementById("chatMessages").innerHTML = '<div class="empty-chat">💬 用户已删除</div>';
                        allUsersCache = [];
                    }
                });
            }
        };
        
        // 搜索输入事件
        document.getElementById("searchUserInput").addEventListener("input", searchUsers);
        
        await loadPublic();
        if (currentUser) await loadContacts();
        setInterval(async () => {
            await loadPublic();
            if (currentUser) {
                await loadContacts();
                if (currentContact) await selectContact(currentContact);
            }
        }, 5000);
    }
    init();
</script>
</body>
</html>
