<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🌐 全球共享留言墙 · 公开+私信</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(145deg, #f5f7fa 0%, #e9eef3 100%); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 16px; min-height: 100vh; }
        .app { max-width: 800px; margin: 0 auto; }
        .header-card { background: rgba(255,255,255,0.95); border-radius: 28px; padding: 18px 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 1.7rem; font-weight: 700; background: linear-gradient(135deg, #4f46e5, #7c3aed); background-clip: text; -webkit-background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .sub { color: #6c727f; font-size: 0.75rem; margin-top: 4px; }
        .identity-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #eef2ff; }
        .nickname-input { flex: 1; min-width: 140px; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 40px; font-size: 0.9rem; }
        .btn-sm { background: #4f46e5; border: none; color: white; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .current-user-badge { background: #eef2ff; padding: 5px 12px; border-radius: 40px; font-size: 0.8rem; color: #4f46e5; }
        .two-columns { display: flex; flex-direction: column; gap: 24px; }
        .wall-card { background: white; border-radius: 28px; padding: 18px; box-shadow: 0 4px 14px rgba(0,0,0,0.05); }
        .card-title { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .card-desc { font-size: 0.7rem; color: #6c727f; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #eef2ff; }
        textarea, input { width: 100%; padding: 12px; border-radius: 20px; border: 1.5px solid #e2e8f0; font-size: 0.9rem; font-family: inherit; }
        .btn-primary { background: #4f46e5; width: 100%; padding: 12px; border-radius: 40px; font-weight: 700; border: none; color: white; cursor: pointer; margin-top: 8px; }
        .msg-list { max-height: 450px; overflow-y: auto; margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg-item { background: #fafcff; border-radius: 20px; padding: 12px; border: 1px solid #eef2ff; }
        .msg-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #6c727f; margin-bottom: 8px; }
        .msg-name { font-weight: 700; color: #1e293b; background: #eef2ff; padding: 2px 10px; border-radius: 30px; }
        .msg-content { font-size: 0.9rem; line-height: 1.4; word-break: break-word; margin: 8px 0; }
        .msg-footer { display: flex; justify-content: flex-end; gap: 12px; }
        .del-btn { background: none; border: none; color: #94a3b8; font-size: 0.7rem; padding: 5px 10px; border-radius: 30px; cursor: pointer; }
        .reply-hint { font-size: 0.7rem; background: #f1f5f9; padding: 4px 8px; border-radius: 20px; cursor: pointer; display: inline-block; }
        .empty-msg { text-align: center; color: #94a3b8; padding: 30px; font-style: italic; }
        footer { text-align: center; margin-top: 24px; font-size: 0.7rem; color: #7e8b9c; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header-card">
        <h1><span>🌍</span> 全球共享留言墙</h1>
        <div class="sub">所有人看到的留言都是相同的 · 数据实时互通</div>
        <div class="identity-bar">
            <label>👤 我的昵称</label>
            <input type="text" id="nicknameInput" class="nickname-input" placeholder="取名，如：小鹿">
            <button id="setNicknameBtn" class="btn-sm">✓ 切换</button>
            <span id="currentUserBadge" class="current-user-badge">未设置</span>
        </div>
        <div style="font-size:12px; margin-top:10px; color:#4f46e5;">✅ 全球数据互通 | 所有人共享留言</div>
    </div>

    <div class="two-columns">
        <div class="wall-card">
            <div class="card-title"><span>📢</span> 公开留言墙</div>
            <div class="card-desc">所有人可见 · 全世界都能看到</div>
            <textarea id="publicContent" rows="2" placeholder="说点什么吧… 全世界都能看见"></textarea>
            <button id="postPublicBtn" class="btn-primary">✍️ 发布公开留言</button>
            <div id="publicList" class="msg-list"><div class="empty-msg">🌐 加载全球留言中...</div></div>
        </div>

        <div class="wall-card">
            <div class="card-title"><span>💌</span> 私信抽屉</div>
            <div class="card-desc">仅你与对方可见 · 全球私信互通</div>
            <input type="text" id="privateTo" placeholder="发给谁？输入对方昵称" style="margin-bottom: 10px;">
            <textarea id="privateContent" rows="2" placeholder="写下悄悄话..."></textarea>
            <button id="sendPrivateBtn" class="btn-primary">🔒 发送私信</button>
            <div id="privateList" class="msg-list"><div class="empty-msg">💌 暂无往来私信</div></div>
        </div>
    </div>
    <footer>💾 所有数据存储在 Google Sheets 云端 | 全球用户共享同一数据库</footer>
</div>

<script>
    // ========== 请替换成你的 Google Apps Script 地址 ==========
    const API_BASE = "https://script.google.com/macros/s/AKfycbxRlK0LyB4qnVnoo8yhO7https://script.google.com/macros/s/AKfycbxRlK0LyB4qnVnoo8yhO71P4Xe8SbK6i8rRgwNrE2fPhIy0REgtWBLfU_CndEEVw_I/exec1P4Xe8SbK6i8rRgwNrE2fPhIy0REgtWBLfU_CndEEVw_I/exec";  // 👈 在这里粘贴你的 Web App URL
    // =======================================================

    let currentUser = "";

    // 通用请求函数
    async function apiCall(params) {
        const url = new URL(API_BASE);
        Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
        const response = await fetch(url.toString());
        return await response.json();
    }

    // 加载公开留言
    async function loadPublicMessages() {
        const container = document.getElementById("publicList");
        container.innerHTML = '<div class="empty-msg">⏳ 加载中...</div>';
        try {
            const data = await apiCall({ action: "getPublic" });
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-msg">✨ 第一条留言等你来写～</div>';
                return;
            }
            const sorted = data.sort((a,b) => b.timestamp - a.timestamp);
            container.innerHTML = "";
            sorted.forEach(msg => {
                const isOwner = (currentUser === msg.username);
                const card = document.createElement("div");
                card.className = "msg-item";
                card.innerHTML = `
                    <div class="msg-header"><span class="msg-name">${escapeHtml(msg.username)}</span><span class="msg-time">${formatTime(msg.timestamp)}</span></div>
                    <div class="msg-content">${escapeHtml(msg.content)}</div>
                    <div class="msg-footer">${isOwner ? `<button class="del-btn" data-type="public" data-id="${msg.id}">🗑️ 删除</button>` : ''}</div>
                `;
                container.appendChild(card);
            });
            bindDeleteEvents();
        } catch(e) { container.innerHTML = '<div class="empty-msg">⚠️ 网络错误，刷新重试</div>'; }
    }

    // 加载私信
    async function loadPrivateMessages() {
        if (!currentUser) {
            document.getElementById("privateList").innerHTML = '<div class="empty-msg">⚠️ 先设置昵称</div>';
            return;
        }
        const container = document.getElementById("privateList");
        container.innerHTML = '<div class="empty-msg">⏳ 加载中...</div>';
        try {
            const data = await apiCall({ action: "getPrivate", currentUser: currentUser });
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-msg">💌 暂无私信</div>';
                return;
            }
            const sorted = data.sort((a,b) => b.timestamp - a.timestamp);
            container.innerHTML = "";
            sorted.forEach(pm => {
                const isSender = (pm.fromUser === currentUser);
                const other = isSender ? pm.toUser : pm.fromUser;
                const direction = isSender ? `📤 致 ${other}` : `📩 来自 ${other}`;
                const canDelete = isSender;
                const card = document.createElement("div");
                card.className = "msg-item";
                card.innerHTML = `
                    <div class="msg-header"><span class="msg-name">${direction}</span><span class="msg-time">${formatTime(pm.timestamp)}</span></div>
                    <div class="msg-content">💬 ${escapeHtml(pm.content)}</div>
                    <div class="msg-footer">
                        <span class="reply-hint" data-replyname="${escapeHtml(other)}">↩️ 回复</span>
                        ${canDelete ? `<button class="del-btn" data-type="private" data-id="${pm.id}">🗑️ 删除</button>` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
            document.querySelectorAll(".reply-hint").forEach(el => {
                el.addEventListener("click", () => {
                    const name = el.getAttribute("data-replyname");
                    if (name && name !== currentUser) {
                        document.getElementById("privateTo").value = name;
                        document.getElementById("privateContent").focus();
                    }
                });
            });
            bindDeleteEvents();
        } catch(e) { container.innerHTML = '<div class="empty-msg">⚠️ 加载失败</div>'; }
    }

    // 发布公开留言
    async function postPublic() {
        if (!currentUser) { alert("请先设置昵称"); return; }
        const content = document.getElementById("publicContent").value.trim();
        if (!content) { alert("内容不能为空"); return; }
        await apiCall({ action: "addPublic", username: currentUser, content: content, timestamp: Date.now() });
        document.getElementById("publicContent").value = "";
        await loadPublicMessages();
    }

    // 发送私信
    async function sendPrivate() {
        if (!currentUser) { alert("请先设置昵称"); return; }
        const toUser = document.getElementById("privateTo").value.trim();
        const content = document.getElementById("privateContent").value.trim();
        if (!toUser) { alert("请输入接收人"); return; }
        if (toUser === currentUser) { alert("不能发给自己"); return; }
        if (!content) { alert("内容不能为空"); return; }
        await apiCall({ action: "addPrivate", fromUser: currentUser, toUser: toUser, content: content, timestamp: Date.now() });
        document.getElementById("privateTo").value = "";
        document.getElementById("privateContent").value = "";
        await loadPrivateMessages();
        alert("✅ 私信已发送");
    }

    // 删除
    async function deleteMsg(type, id) {
        if (confirm("确定删除吗？")) {
            await apiCall({ action: type === "public" ? "deletePublic" : "deletePrivate", id: id });
            if (type === "public") await loadPublicMessages();
            else await loadPrivateMessages();
        }
    }

    function bindDeleteEvents() {
        document.querySelectorAll(".del-btn").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const type = btn.getAttribute("data-type");
                const id = btn.getAttribute("data-id");
                deleteMsg(type, id);
            };
        });
    }

    function setCurrentUser(name) {
        if (!name.trim()) return;
        currentUser = name.trim();
        localStorage.setItem("global_wall_user", currentUser);
        document.getElementById("currentUserBadge").innerText = currentUser;
        document.getElementById("nicknameInput").value = currentUser;
        loadPrivateMessages();
        loadPublicMessages();
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
    function formatTime(ts) { const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

    async function init() {
        const saved = localStorage.getItem("global_wall_user");
        if (saved) currentUser = saved;
        else currentUser = "游客" + Math.floor(Math.random()*1000);
        document.getElementById("currentUserBadge").innerText = currentUser;
        document.getElementById("nicknameInput").value = currentUser;
        document.getElementById("setNicknameBtn").onclick = () => setCurrentUser(document.getElementById("nicknameInput").value);
        document.getElementById("postPublicBtn").onclick = postPublic;
        document.getElementById("sendPrivateBtn").onclick = sendPrivate;
        await loadPublicMessages();
        await loadPrivateMessages();
    }
    init();
</script>
</body>
</html>
