<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言墙并发测试工具</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #f5f7fa; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 28px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #547443; }
        button { background: #547443; color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-right: 10px; }
        .log { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 20px; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; }
        .stats { margin: 20px 0; display: flex; gap: 20px; flex-wrap: wrap; }
        .stat { background: #f1f5f9; padding: 12px 20px; border-radius: 20px; }
        .stat span { font-weight: bold; color: #547443; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 40px; }
        .warning { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 20px; margin: 10px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>🧪 留言墙并发测试 (50 虚拟用户)</h1>
    <p>⚠️ 注意：此测试会创建测试用户和留言，测试完成后可点击清理按钮删除所有测试数据。</p>
    <div>
        <label>Supabase URL:</label>
        <input type="text" id="supabaseUrl" value="https://chfanuzhklzzawbcazjp.supabase.co">
        <label>Supabase Anon Key:</label>
        <input type="text" id="supabaseKey" value="sb_publishable_7yvNBNHbSe-2cPbQ-yiXpA_z6dr1DYf">
        <label>管理员密码 (用于测试改名/删除):</label>
        <input type="text" id="adminPassword" value="reset2024">
    </div>
    <div class="stats">
        <div class="stat">总操作数: <span id="totalOps">0</span></div>
        <div class="stat">成功: <span id="successCount">0</span></div>
        <div class="stat">失败: <span id="failCount">0</span></div>
        <div class="stat">耗时: <span id="duration">0</span> ms</div>
    </div>
    <div>
        <button id="runTestBtn">▶ 开始并发测试 (50用户)</button>
        <button id="clearDataBtn">🗑️ 清理测试数据 (删除 test_user_* 用户)</button>
    </div>
    <div class="log" id="log"></div>
</div>

<script>
    let supabaseClient = null;
    const logDiv = document.getElementById('log');
    function log(msg, isError = false) {
        const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
        const p = document.createElement('div');
        p.textContent = line;
        if (isError) p.style.color = '#f87171';
        else p.style.color = '#86efac';
        logDiv.appendChild(p);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(line);
    }

    async function initSupabase() {
        const url = document.getElementById('supabaseUrl').value;
        const key = document.getElementById('supabaseKey').value;
        if (!url || !key) {
            alert('请填写 SUPABASE_URL 和 ANON_KEY');
            return null;
        }
        return window.supabase.createClient(url, key);
    }

    function randomUsername() {
        return `test_user_${Math.random().toString(36).substring(2, 10)}`;
    }

    async function createUser(supabase, username) {
        const { error } = await supabase.from('users').insert({ username });
        if (error && error.code !== '23505') {
            return { success: false, error };
        }
        return { success: true };
    }

    async function postPublic(supabase, username, content) {
        const { error } = await supabase.from('public_messages').insert({
            username,
            content,
            timestamp: Date.now()
        });
        return { success: !error, error };
    }

    async function sendPrivate(supabase, fromUser, toUser, content) {
        const { error } = await supabase.from('private_messages').insert({
            fromUser,
            toUser,
            content,
            timestamp: Date.now()
        });
        return { success: !error, error };
    }

    async function adminRename(supabase, oldName, newName) {
        const { data, error } = await supabase.rpc('admin_rename_user', { old_name: oldName, new_name: newName });
        return { success: !error, error };
    }

    async function adminDelete(supabase, username) {
        const { error } = await supabase.rpc('admin_delete_user', { target_name: username });
        return { success: !error, error };
    }

    async function runConcurrentTest() {
        const supabase = await initSupabase();
        if (!supabase) return;
        const startTime = performance.now();
        let success = 0;
        let fail = 0;
        let total = 0;
        const updateStats = () => {
            document.getElementById('totalOps').innerText = total;
            document.getElementById('successCount').innerText = success;
            document.getElementById('failCount').innerText = fail;
        };
        
        log('🚀 开始 50 用户并发测试...');
        
        const userCount = 50;
        const users = Array.from({ length: userCount }, () => randomUsername());
        
        log(`📝 准备创建 ${userCount} 个测试用户...`);
        const createPromises = users.map(async (u) => {
            total++;
            const result = await createUser(supabase, u);
            if (result.success) { success++; log(`✅ 创建用户 ${u} 成功`); }
            else { fail++; log(`❌ 创建用户 ${u} 失败: ${result.error?.message}`, true); }
            updateStats();
            return { username: u, success: result.success };
        });
        const createResults = await Promise.all(createPromises);
        const validUsers = createResults.filter(r => r.success).map(r => r.username);
        log(`📊 成功创建 ${validUsers.length} 个有效用户`);
        
        if (validUsers.length < 2) {
            log('⚠️ 有效用户不足 2 个，无法继续测试私信', true);
            return;
        }
        
        log('📢 并发发布公开留言...');
        const publicPromises = validUsers.map(async (u) => {
            total++;
            const content = `测试留言 from ${u} at ${Date.now()}`;
            const result = await postPublic(supabase, u, content);
            if (result.success) { success++; log(`✅ 用户 ${u} 发布公开留言成功`); }
            else { fail++; log(`❌ 用户 ${u} 发布公开留言失败: ${result.error?.message}`, true); }
            updateStats();
        });
        await Promise.all(publicPromises);
        
        log('💬 并发发送私信 (随机配对)...');
        const privatePromises = [];
        for (let i = 0; i < validUsers.length; i++) {
            const from = validUsers[i];
            let to = validUsers[Math.floor(Math.random() * validUsers.length)];
            while (to === from && validUsers.length > 1) {
                to = validUsers[Math.floor(Math.random() * validUsers.length)];
            }
            total++;
            const content = `私信测试 from ${from} to ${to} at ${Date.now()}`;
            const result = await sendPrivate(supabase, from, to, content);
            if (result.success) { success++; log(`✅ ${from} -> ${to} 私信发送成功`); }
            else { fail++; log(`❌ ${from} -> ${to} 私信发送失败: ${result.error?.message}`, true); }
            updateStats();
        }
        await Promise.all(privatePromises);
        
        log('👑 开始管理员操作测试 (改名 + 删除)...');
        if (validUsers.length >= 2) {
            const renameTarget = validUsers[0];
            const newName = renameTarget + "_renamed";
            total++;
            const renameResult = await adminRename(supabase, renameTarget, newName);
            if (renameResult.success) {
                success++;
                log(`✅ 管理员改名 ${renameTarget} -> ${newName} 成功`);
                validUsers[0] = newName;
            } else {
                fail++;
                log(`❌ 管理员改名失败: ${renameResult.error?.message}`, true);
            }
            updateStats();
            
            const deleteTarget = validUsers[validUsers.length - 1];
            total++;
            const deleteResult = await adminDelete(supabase, deleteTarget);
            if (deleteResult.success) {
                success++;
                log(`✅ 管理员删除用户 ${deleteTarget} 成功`);
            } else {
                fail++;
                log(`❌ 管理员删除用户 ${deleteTarget} 失败: ${deleteResult.error?.message}`, true);
            }
            updateStats();
        }
        
        const endTime = performance.now();
        const duration = endTime - startTime;
        document.getElementById('duration').innerText = Math.round(duration);
        log(`🏁 测试完成！总耗时 ${duration.toFixed(0)} ms`);
        log(`📈 总操作: ${total}, 成功: ${success}, 失败: ${fail}, 成功率: ${(success/total*100).toFixed(2)}%`);
        
        if (fail > 0) {
            log('⚠️ 测试中存在失败，请检查控制台详细错误。可能原因: 限流(429)、数据库函数未创建、网络延迟等。');
        } else {
            log('🎉 所有并发操作成功！系统稳定性良好。');
        }
    }
    
    async function cleanupTestUsers() {
        const supabase = await initSupabase();
        if (!supabase) return;
        if (!confirm('⚠️ 此操作将永久删除所有以 test_user_ 开头的用户及其留言、私信。不可恢复！确定继续？')) return;
        log('🧹 开始清理测试数据...');
        const { data: users, error } = await supabase.from('users').select('username').like('username', 'test_user_%');
        if (error) {
            log(`获取测试用户失败: ${error.message}`, true);
            return;
        }
        let deleted = 0;
        for (const u of users) {
            const { error: delErr } = await supabase.rpc('admin_delete_user', { target_name: u.username });
            if (delErr) {
                log(`删除 ${u.username} 失败: ${delErr.message}`, true);
            } else {
                deleted++;
                log(`✅ 已删除 ${u.username}`);
            }
        }
        log(`🎉 清理完成，共删除 ${deleted} 个测试用户。`);
    }
    
    document.getElementById('runTestBtn').addEventListener('click', runConcurrentTest);
    document.getElementById('clearDataBtn').addEventListener('click', cleanupTestUsers);
</script>
</body>
</html>
